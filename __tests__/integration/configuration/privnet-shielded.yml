# Private Network Configuration for shielded output integration tests.
# Uses genesis parameters compatible with the experimental-shielded-outputs
# fullnode image (alpha-v3 family).
#
# Genesis wallet seed:
# avocado spot town typical traffic vault danger century property shallow divorce festival spend attack anchor afford rotate green audit adjust fade wagon depart level

P2PKH_VERSION_BYTE: x49
MULTISIG_VERSION_BYTE: x87
NETWORK_NAME: nano-testnet-bravo
BOOTSTRAP_DNS: []
ENABLE_PEER_WHITELIST: false

# Genesis stuff (matches the experimental shielded outputs fullnode image)
GENESIS_OUTPUT_SCRIPT: 76a91466665b27f7dbc4c8c089d2f686c170c74d66f0b588ac
GENESIS_BLOCK_TIMESTAMP: 1643902665
GENESIS_BLOCK_NONCE: 4784939
GENESIS_BLOCK_HASH: 00000334a21fbb58b4db8d7ff282d018e03e2977abd3004cf378fb1d677c3967
GENESIS_TX1_NONCE: 0
GENESIS_TX1_HASH: 54165cef1fd4cf2240d702b8383c307c822c16ca407f78014bdefa189a7571c2
GENESIS_TX2_NONCE: 0
GENESIS_TX2_HASH: 039906854ce6309b3180945f2a23deb9edff369753f7082e19053f5ac11bfbae

MIN_TX_WEIGHT_K: 0
MIN_TX_WEIGHT_COEFFICIENT: 0
MIN_TX_WEIGHT: 1
REWARD_SPEND_MIN_BLOCKS: 1

CHECKPOINTS: []

# alpha-v2+ requires nano-contract activation to come through the
# feature-activation machinery (the strict validator rejects static
# `enabled`/`disabled` for features that have FEATURE_ACTIVATION criteria).
# We pin activation at height 0 so the privnet starts with nano contracts
# already on, matching the previous `ENABLE_NANO_CONTRACTS: enabled`
# behaviour. ENABLE_FEE_BASED_TOKENS / ENABLE_SHIELDED_TRANSACTIONS are not
# under feature_activation, so the static-toggle form is still correct.
ENABLE_NANO_CONTRACTS: feature_activation
ENABLE_FEE_BASED_TOKENS: enabled
ENABLE_SHIELDED_TRANSACTIONS: enabled
NC_ON_CHAIN_BLUEPRINT_RESTRICTED: false
AVG_TIME_BETWEEN_BLOCKS: 5
FEE_PER_OUTPUT: 1

FEATURE_ACTIVATION:
  evaluation_interval: 4
  default_threshold: 1
  features:
    NANO_CONTRACTS:
      start_height: 0
      minimum_activation_height: 0
      timeout_height: 100
      lock_in_on_timeout: true

extends: mainnet.yml
